<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PDF 리더 — 보고 읽어주는 페이지</title>
  <style>
    :root {
      --bg: #1a1a1e;
      --panel: #25252b;
      --border: #3a3a42;
      --fg: #e8e8ea;
      --muted: #9a9aa2;
      --accent: #6c8cff;
      --accent-2: #4caf7d;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      background: var(--bg);
      color: var(--fg);
      display: flex;
      flex-direction: column;
      height: 100vh;
      overflow: hidden;
    }
    header {
      padding: 12px 16px;
      background: var(--panel);
      border-bottom: 1px solid var(--border);
      display: flex;
      gap: 10px;
      align-items: center;
      flex-wrap: wrap;
    }
    header h1 {
      font-size: 15px;
      margin: 0 12px 0 0;
      font-weight: 600;
      white-space: nowrap;
    }
    button, select, label.file {
      background: var(--border);
      color: var(--fg);
      border: none;
      border-radius: 6px;
      padding: 7px 12px;
      font-size: 13px;
      cursor: pointer;
      transition: background .15s;
    }
    button:hover:not(:disabled), label.file:hover { background: #4a4a54; }
    button:disabled { opacity: .4; cursor: not-allowed; }
    button.primary { background: var(--accent); color: #fff; }
    button.primary:hover:not(:disabled) { background: #5a7cf5; }
    button.speak { background: var(--accent-2); color: #fff; }
    button.speak:hover:not(:disabled) { background: #3f9a6c; }
    label.file input { display: none; }
    .pageinfo { font-size: 13px; color: var(--muted); min-width: 70px; text-align: center; }
    .spacer { flex: 1; }
    main {
      flex: 1;
      overflow: auto;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding: 20px;
    }
    #canvas-wrap {
      position: relative;
      box-shadow: 0 4px 24px rgba(0,0,0,.5);
      line-height: 0;
    }
    canvas { display: block; }
    /* 텍스트 레이어 — 읽는 중인 문장 하이라이트용 */
    #text-layer {
      position: absolute;
      inset: 0;
      overflow: hidden;
      line-height: 1;
      opacity: 0.25;
    }
    #text-layer span {
      position: absolute;
      color: transparent;
      white-space: pre;
      transform-origin: 0 0;
    }
    .placeholder {
      color: var(--muted);
      font-size: 14px;
      text-align: center;
      margin-top: 80px;
      line-height: 1.7;
    }
    .rate { display: flex; align-items: center; gap: 6px; font-size: 12px; color: var(--muted); }
    .rate input { width: 90px; }
    .status { font-size: 12px; color: var(--muted); }
  </style>
</head>
<body>
  <header>
    <h1>📖 PDF 리더</h1>
    <label class="file">
      PDF 열기
      <input type="file" id="file" accept="application/pdf" />
    </label>
    <button id="prev" disabled>◀ 이전</button>
    <span class="pageinfo" id="pageinfo">- / -</span>
    <button id="next" disabled>다음 ▶</button>
    <button class="speak" id="speak" disabled>🔊 읽기</button>
    <button id="stop" disabled>⏹ 정지</button>
    <div class="rate">
      속도
      <input type="range" id="rate" min="0.5" max="2" step="0.1" value="1" />
      <span id="rateval">1.0x</span>
    </div>
    <select id="voice" title="음성 선택"></select>
    <div class="spacer"></div>
    <span class="status" id="status"></span>
  </header>
  <main>
    <div id="canvas-wrap" style="display:none">
      <canvas id="canvas"></canvas>
      <div id="text-layer"></div>
    </div>
    <div class="placeholder" id="placeholder">
      상단의 <b>PDF 열기</b>로 파일을 선택해줘.<br />
      페이지가 보이면 <b>🔊 읽기</b>로 현재 페이지 텍스트를 음성으로 들을 수 있다.
    </div>
  </main>

  <script type="module">
    import * as pdfjsLib from "https://cdn.jsdelivr.net/npm/pdfjs-dist@4.7.76/build/pdf.min.mjs";
    pdfjsLib.GlobalWorkerOptions.workerSrc =
      "https://cdn.jsdelivr.net/npm/pdfjs-dist@4.7.76/build/pdf.worker.min.mjs";

    const $ = (id) => document.getElementById(id);
    const fileInput = $("file");
    const canvas = $("canvas");
    const ctx = canvas.getContext("2d");
    const textLayer = $("text-layer");
    const wrap = $("canvas-wrap");
    const placeholder = $("placeholder");
    const pageinfo = $("pageinfo");
    const statusEl = $("status");

    let pdfDoc = null;
    let pageNum = 1;
    let rendering = false;
    let pendingPage = null;
    let currentText = "";
    const SCALE = 1.5;

    function setStatus(msg) { statusEl.textContent = msg || ""; }

    async function loadPDF(data) {
      stopSpeak();
      setStatus("로딩 중…");
      try {
        pdfDoc = await pdfjsLib.getDocument({ data }).promise;
        pageNum = 1;
        wrap.style.display = "block";
        placeholder.style.display = "none";
        await renderPage(pageNum);
        setStatus(`${pdfDoc.numPages}쪽 문서`);
      } catch (e) {
        setStatus("로드 실패: " + e.message);
        console.error(e);
      }
    }

    async function renderPage(num) {
      if (rendering) { pendingPage = num; return; }
      rendering = true;
      const page = await pdfDoc.getPage(num);
      const viewport = page.getViewport({ scale: SCALE });
      const dpr = window.devicePixelRatio || 1;
      canvas.width = viewport.width * dpr;
      canvas.height = viewport.height * dpr;
      canvas.style.width = viewport.width + "px";
      canvas.style.height = viewport.height + "px";
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);

      await page.render({ canvasContext: ctx, viewport }).promise;
      await buildTextLayer(page, viewport);

      pageinfo.textContent = `${num} / ${pdfDoc.numPages}`;
      $("prev").disabled = num <= 1;
      $("next").disabled = num >= pdfDoc.numPages;
      $("speak").disabled = !currentText.trim();

      rendering = false;
      if (pendingPage !== null) {
        const p = pendingPage; pendingPage = null;
        renderPage(p);
      }
    }

    // 텍스트 추출 + 위치 오버레이(하이라이트/추출 동시 해결)
    async function buildTextLayer(page, viewport) {
      const tc = await page.getTextContent();
      textLayer.innerHTML = "";
      textLayer.style.width = viewport.width + "px";
      textLayer.style.height = viewport.height + "px";

      const parts = [];
      for (const item of tc.items) {
        if (!item.str) continue;
        parts.push(item.str + (item.hasEOL ? "\n" : ""));
        const tx = pdfjsLib.Util.transform(viewport.transform, item.transform);
        const span = document.createElement("span");
        span.textContent = item.str;
        const fontSize = Math.hypot(tx[2], tx[3]);
        span.style.left = tx[4] + "px";
        span.style.top = (tx[5] - fontSize) + "px";
        span.style.fontSize = fontSize + "px";
        textLayer.appendChild(span);
      }
      currentText = parts.join("").replace(/\n{2,}/g, "\n").trim();
    }

    // ---- Web Speech API ----
    const synth = window.speechSynthesis;
    let voices = [];

    function loadVoices() {
      voices = synth.getVoices();
      const sel = $("voice");
      const prev = sel.value;
      sel.innerHTML = "";
      // 한국어 음성 우선 정렬
      voices
        .slice()
        .sort((a, b) => (b.lang.startsWith("ko") - a.lang.startsWith("ko")))
        .forEach((v) => {
          const opt = document.createElement("option");
          opt.value = v.name;
          opt.textContent = `${v.name} (${v.lang})`;
          sel.appendChild(opt);
        });
      if (prev) sel.value = prev;
    }
    loadVoices();
    if (synth.onvoiceschanged !== undefined) synth.onvoiceschanged = loadVoices;

    function speak() {
      if (!currentText.trim()) { setStatus("이 페이지에서 추출된 텍스트가 없다 (스캔본일 수 있음)"); return; }
      synth.cancel();
      const u = new SpeechSynthesisUtterance(currentText);
      const chosen = voices.find((v) => v.name === $("voice").value);
      if (chosen) { u.voice = chosen; u.lang = chosen.lang; }
      else u.lang = "ko-KR";
      u.rate = parseFloat($("rate").value);
      u.onstart = () => { setStatus("읽는 중…"); $("stop").disabled = false; };
      u.onend = () => { setStatus(""); $("stop").disabled = true; };
      u.onerror = (e) => { setStatus("음성 오류: " + e.error); $("stop").disabled = true; };
      synth.speak(u);
    }
    function stopSpeak() { synth.cancel(); setStatus(""); $("stop").disabled = true; }

    // ---- 이벤트 ----
    fileInput.addEventListener("change", async (e) => {
      const f = e.target.files[0];
      if (!f) return;
      const buf = await f.arrayBuffer();
      loadPDF(new Uint8Array(buf));
    });
    $("prev").addEventListener("click", () => { if (pageNum > 1) { stopSpeak(); renderPage(--pageNum); } });
    $("next").addEventListener("click", () => { if (pageNum < pdfDoc.numPages) { stopSpeak(); renderPage(++pageNum); } });
    $("speak").addEventListener("click", speak);
    $("stop").addEventListener("click", stopSpeak);
    $("rate").addEventListener("input", (e) => { $("rateval").textContent = parseFloat(e.target.value).toFixed(1) + "x"; });

    document.addEventListener("keydown", (e) => {
      if (!pdfDoc) return;
      if (e.key === "ArrowLeft") $("prev").click();
      if (e.key === "ArrowRight") $("next").click();
    });
  </script>
</body>
</html>
