<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <title>PDF 리더</title>
  <style>
    :root {
      --bg: #1a1a1e;
      --panel: #25252b;
      --border: #3a3a42;
      --fg: #e8e8ea;
      --muted: #9a9aa2;
      --accent: #6c8cff;
      --accent-2: #4caf7d;
      --danger: #e0574d;
      --safe-top: env(safe-area-inset-top, 0px);
      --safe-bottom: env(safe-area-inset-bottom, 0px);
    }
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    html, body { height: 100%; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      background: var(--bg);
      color: var(--fg);
      display: flex;
      flex-direction: column;
      height: 100dvh;
      overflow: hidden;
      user-select: none;
    }

    /* ---- 상단 바 ---- */
    header {
      background: var(--panel);
      border-bottom: 1px solid var(--border);
      padding: calc(10px + var(--safe-top)) 12px 10px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .toprow { display: flex; align-items: center; gap: 10px; }
    .title { font-size: 16px; font-weight: 700; }
    .spacer { flex: 1; }
    .icon-btn {
      width: 40px; height: 40px;
      display: grid; place-items: center;
      background: var(--border); color: var(--fg);
      border: none; border-radius: 10px;
      font-size: 18px; cursor: pointer;
    }
    .icon-btn:active { background: #4a4a54; }

    label.file {
      display: inline-flex; align-items: center; gap: 6px;
      background: var(--accent); color: #fff;
      border-radius: 10px; padding: 9px 14px;
      font-size: 14px; font-weight: 600; cursor: pointer;
    }
    label.file input { display: none; }

    /* 페이지 네비 (파일 로드 후 노출) */
    .nav { display: none; align-items: center; gap: 10px; }
    .nav.show { display: flex; }
    .nav button {
      flex: 1; height: 42px;
      background: var(--border); color: var(--fg);
      border: none; border-radius: 10px;
      font-size: 16px; cursor: pointer;
    }
    .nav button:active:not(:disabled) { background: #4a4a54; }
    .nav button:disabled { opacity: .35; }
    .pageinfo {
      min-width: 76px; text-align: center;
      font-size: 14px; color: var(--muted); font-variant-numeric: tabular-nums;
    }

    /* ---- 뷰어 ---- */
    main {
      flex: 1;
      overflow: auto;
      -webkit-overflow-scrolling: touch;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding: 14px;
    }
    #canvas-wrap { position: relative; box-shadow: 0 4px 24px rgba(0,0,0,.5); line-height: 0; max-width: 100%; }
    canvas { display: block; max-width: 100%; height: auto; }
    .placeholder {
      color: var(--muted); font-size: 14px; text-align: center;
      margin-top: 60px; line-height: 1.8; padding: 0 24px;
    }

    /* ---- 하단 재생 컨트롤 ---- */
    footer {
      background: var(--panel);
      border-top: 1px solid var(--border);
      padding: 12px 16px calc(12px + var(--safe-bottom));
      display: flex; gap: 12px;
    }
    footer button {
      flex: 1; height: 54px;
      border: none; border-radius: 14px;
      font-size: 16px; font-weight: 700; color: #fff;
      cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px;
    }
    footer button:disabled { opacity: .35; }
    #playpause { background: var(--accent-2); }
    #playpause:active:not(:disabled) { filter: brightness(1.1); }
    #stopbtn { background: var(--danger); flex: 0 0 84px; }
    #stopbtn:active:not(:disabled) { filter: brightness(1.1); }

    .status {
      position: fixed; left: 50%; transform: translateX(-50%);
      bottom: calc(90px + var(--safe-bottom));
      background: rgba(0,0,0,.8); color: #fff;
      font-size: 13px; padding: 8px 14px; border-radius: 999px;
      pointer-events: none; opacity: 0; transition: opacity .2s; max-width: 90vw; text-align: center;
    }
    .status.show { opacity: 1; }

    /* ---- 설정 바텀시트 ---- */
    .scrim {
      position: fixed; inset: 0; background: rgba(0,0,0,.5);
      opacity: 0; pointer-events: none; transition: opacity .25s; z-index: 10;
    }
    .scrim.show { opacity: 1; pointer-events: auto; }
    .sheet {
      position: fixed; left: 0; right: 0; bottom: 0; z-index: 11;
      background: var(--panel); border-top-left-radius: 18px; border-top-right-radius: 18px;
      padding: 8px 20px calc(24px + var(--safe-bottom));
      transform: translateY(110%); transition: transform .28s cubic-bezier(.3,.7,.3,1);
    }
    .sheet.show { transform: translateY(0); }
    .grabber { width: 40px; height: 4px; background: var(--border); border-radius: 2px; margin: 8px auto 16px; }
    .sheet h2 { font-size: 16px; margin: 0 0 18px; }
    .field { margin-bottom: 22px; }
    .field label { display: block; font-size: 13px; color: var(--muted); margin-bottom: 10px; }
    .field .row { display: flex; align-items: center; gap: 12px; }
    .field input[type=range] { flex: 1; accent-color: var(--accent); height: 28px; }
    .field .val { font-size: 14px; min-width: 44px; text-align: right; font-variant-numeric: tabular-nums; }
    .field select {
      width: 100%; background: var(--border); color: var(--fg);
      border: 1px solid var(--border); border-radius: 10px;
      padding: 12px; font-size: 14px;
    }
    /* 토글 스위치 */
    .switch { position: relative; display: inline-block; width: 48px; height: 28px; flex: 0 0 auto; }
    .switch input { display: none; }
    .switch .slider {
      position: absolute; inset: 0; background: var(--border);
      border-radius: 999px; transition: background .2s; cursor: pointer;
    }
    .switch .slider::before {
      content: ""; position: absolute; height: 22px; width: 22px; left: 3px; top: 3px;
      background: #fff; border-radius: 50%; transition: transform .2s;
    }
    .switch input:checked + .slider { background: var(--accent); }
    .switch input:checked + .slider::before { transform: translateX(20px); }
  </style>
</head>
<body>
  <header>
    <div class="toprow">
      <span class="title">📖 PDF 리더</span>
      <div class="spacer"></div>
      <label class="file">
        📁 열기
        <input type="file" id="file" accept="application/pdf" />
      </label>
      <button class="icon-btn" id="openSettings" title="설정">⚙️</button>
    </div>
    <div class="nav" id="nav">
      <button id="prev">◀</button>
      <span class="pageinfo" id="pageinfo">- / -</span>
      <button id="next">▶</button>
    </div>
  </header>

  <main>
    <div id="canvas-wrap" style="display:none">
      <canvas id="canvas"></canvas>
    </div>
    <div class="placeholder" id="placeholder">
      상단 <b>📁 열기</b>로 PDF를 선택해줘.<br />
      페이지를 넘기며 하단 버튼으로 음성 재생할 수 있다.
    </div>
  </main>

  <footer>
    <button id="playpause" disabled>▶ 재생</button>
    <button id="stopbtn" disabled>⏹</button>
  </footer>

  <div class="status" id="status"></div>

  <!-- 설정 바텀시트 -->
  <div class="scrim" id="scrim"></div>
  <div class="sheet" id="sheet">
    <div class="grabber"></div>
    <h2>설정</h2>
    <div class="field">
      <label>읽기 속도</label>
      <div class="row">
        <input type="range" id="rate" min="0.5" max="2" step="0.1" value="1" />
        <span class="val" id="rateval">1.0x</span>
      </div>
    </div>
    <div class="field">
      <label>TTS 음성 엔진</label>
      <select id="voice"></select>
    </div>
    <div class="field">
      <label>문장 다듬기</label>
      <div class="row" style="justify-content:space-between">
        <span style="font-size:14px">AI 문장 분할 <span style="color:var(--muted);font-size:12px">(실험적 · 최초 1회 ~215MB)</span></span>
        <label class="switch">
          <input type="checkbox" id="aiToggle" />
          <span class="slider"></span>
        </label>
      </div>
      <p style="font-size:11px;color:var(--muted);margin:8px 0 0;line-height:1.5">
        켜면 onnxruntime-web로 문장 경계를 모델이 잡아 낭독이 자연스러워진다. 데스크톱 Chrome 권장. 미지원/실패 시 규칙 기반으로 자동 폴백.
      </p>
    </div>
  </div>

  <script type="module">
    import * as pdfjsLib from "https://cdn.jsdelivr.net/npm/pdfjs-dist@4.7.76/build/pdf.min.mjs";
    pdfjsLib.GlobalWorkerOptions.workerSrc =
      "https://cdn.jsdelivr.net/npm/pdfjs-dist@4.7.76/build/pdf.worker.min.mjs";

    const $ = (id) => document.getElementById(id);
    const canvas = $("canvas");
    const ctx = canvas.getContext("2d");
    const wrap = $("canvas-wrap");
    const placeholder = $("placeholder");
    const pageinfo = $("pageinfo");
    const playpause = $("playpause");
    const stopbtn = $("stopbtn");

    let pdfDoc = null;
    let pageNum = 1;
    let rendering = false;
    let pendingPage = null;
    let currentText = "";
    let baseText = "";          // 규칙 기반 정리 결과 (AI 폴백용 원본)
    const SCALE = 2; // 모바일 고해상도

    // PDF 추출 텍스트를 TTS 낭독용으로 규칙 기반 정리 (모델 없음, 결정적)
    function cleanForTTS(raw) {
      // 1) 줄 단위 공백 정규화 + 노이즈 줄 제거
      const lines = raw.split("\n").map((l) => l.replace(/[ \t ]+/g, " ").trim());
      const kept = lines.filter((l) => {
        if (l === "") return true;                                  // 단락 경계 보존
        if (/^[-–—\s]*\d{1,4}[-–—\s]*$/.test(l)) return false;      // 페이지번호만 있는 줄
        if (/^(page|페이지)\s*\d+\s*$/i.test(l)) return false;       // "page 12" / "페이지 12"
        return true;
      });

      // 2) 빈 줄로 단락 분리
      const paras = [];
      let cur = [];
      for (const l of kept) {
        if (l === "") { if (cur.length) { paras.push(cur); cur = []; } }
        else cur.push(l);
      }
      if (cur.length) paras.push(cur);

      // 3) 단락 내 줄 결합: 라틴 하이픈은 붙이고, 그 외 소프트 줄바꿈은 공백으로
      const out = paras.map((arr) => {
        let s = arr[0] || "";
        for (let i = 1; i < arr.length; i++) {
          if (/[A-Za-z]-$/.test(s)) s = s.slice(0, -1) + arr[i];   // infor- mation → information
          else s += " " + arr[i];
        }
        return s.replace(/ {2,}/g, " ").trim();
      });

      // 4) 단락 사이는 줄바꿈(낭독 시 짧은 쉼)
      return out.join("\n").trim();
    }

    let statusTimer = null;
    function setStatus(msg, sticky) {
      const el = $("status");
      clearTimeout(statusTimer);
      if (!msg) { el.classList.remove("show"); return; }
      el.textContent = msg;
      el.classList.add("show");
      if (!sticky) statusTimer = setTimeout(() => el.classList.remove("show"), 2200);
    }

    async function loadPDF(data) {
      stopSpeak();
      setStatus("로딩 중…", true);
      try {
        pdfDoc = await pdfjsLib.getDocument({ data }).promise;
        pageNum = 1;
        wrap.style.display = "block";
        placeholder.style.display = "none";
        $("nav").classList.add("show");
        await renderPage(pageNum);
        setStatus(`${pdfDoc.numPages}쪽 문서`);
      } catch (e) {
        setStatus("로드 실패: " + e.message, true);
        console.error(e);
      }
    }

    async function renderPage(num) {
      if (rendering) { pendingPage = num; return; }
      rendering = true;
      const page = await pdfDoc.getPage(num);
      const viewport = page.getViewport({ scale: SCALE });
      canvas.width = viewport.width;
      canvas.height = viewport.height;
      await page.render({ canvasContext: ctx, viewport }).promise;

      const tc = await page.getTextContent();
      const raw = tc.items.map((i) => i.str + (i.hasEOL ? "\n" : "")).join("");
      baseText = cleanForTTS(raw);
      currentText = baseText;

      pageinfo.textContent = `${num} / ${pdfDoc.numPages}`;
      $("prev").disabled = num <= 1;
      $("next").disabled = num >= pdfDoc.numPages;
      playpause.disabled = !currentText;

      rendering = false;
      if (pendingPage !== null) { const p = pendingPage; pendingPage = null; renderPage(p); return; }

      if (useAI) applyAI(num); // 비동기 — 캔버스 렌더 막지 않음
    }

    // ---- Web Speech API ----
    const synth = window.speechSynthesis;
    let voices = [];
    let state = "idle"; // idle | playing | paused

    function loadVoices() {
      voices = synth.getVoices();
      const sel = $("voice");
      const prev = sel.value;
      sel.innerHTML = "";
      voices.slice()
        .sort((a, b) => (b.lang.startsWith("ko") - a.lang.startsWith("ko")))
        .forEach((v) => {
          const opt = document.createElement("option");
          opt.value = v.name;
          opt.textContent = `${v.name} (${v.lang})`;
          sel.appendChild(opt);
        });
      if (prev) sel.value = prev;
    }
    loadVoices();
    if (synth.onvoiceschanged !== undefined) synth.onvoiceschanged = loadVoices;

    function setState(s) {
      state = s;
      if (s === "playing") { playpause.innerHTML = "⏸ 일시정지"; stopbtn.disabled = false; }
      else if (s === "paused") { playpause.innerHTML = "▶ 이어듣기"; stopbtn.disabled = false; }
      else { playpause.innerHTML = "▶ 재생"; stopbtn.disabled = true; }
    }

    function startSpeak() {
      if (!currentText) { setStatus("추출된 텍스트 없음 (스캔본일 수 있음)"); return; }
      synth.cancel();
      const u = new SpeechSynthesisUtterance(currentText);
      const chosen = voices.find((v) => v.name === $("voice").value);
      if (chosen) { u.voice = chosen; u.lang = chosen.lang; } else u.lang = "ko-KR";
      u.rate = parseFloat($("rate").value);
      u.onstart = () => setState("playing");
      u.onend = () => setState("idle");
      u.onerror = (e) => { if (e.error !== "canceled" && e.error !== "interrupted") setStatus("음성 오류: " + e.error); setState("idle"); };
      synth.speak(u);
    }

    function togglePlay() {
      if (state === "idle") startSpeak();
      else if (state === "playing") { synth.pause(); setState("paused"); }
      else if (state === "paused") { synth.resume(); setState("playing"); }
    }
    function stopSpeak() { synth.cancel(); setState("idle"); }

    // ---- AI 문장 분할 (wtpsplit sat-3l-sm int8 ONNX, opt-in) ----
    let useAI = localStorage.getItem("useAI") === "1";
    const SAT_URL = "https://huggingface.co/ModelCloud/sat-3l-sm-int8-onnx/resolve/main/model.onnx";
    const aiState = { ready: false, promise: null, tok: null, sess: null, ort: null };

    async function fetchModelCached(url) {
      // 215MB 1회만 받고 Cache API에 보관
      try {
        const cache = await caches.open("sat-model-v1");
        let res = await cache.match(url);
        if (!res) {
          res = await fetch(url);
          if (!res.ok) throw new Error("model fetch " + res.status);
          await cache.put(url, res.clone());
        }
        return await res.arrayBuffer();
      } catch (e) {
        const r = await fetch(url);
        if (!r.ok) throw new Error("model fetch " + r.status);
        return await r.arrayBuffer();
      }
    }

    async function ensureAI() {
      if (aiState.ready) return;
      if (aiState.promise) return aiState.promise;
      aiState.promise = (async () => {
        setStatus("AI 모델 로딩… 최초 1회 ~215MB", true);
        const tfjs = await import("https://cdn.jsdelivr.net/npm/@huggingface/transformers@3.3.3");
        tfjs.env.allowLocalModels = false;
        aiState.tok = await tfjs.AutoTokenizer.from_pretrained("Xenova/xlm-roberta-base");

        const ortMod = await import("https://cdn.jsdelivr.net/npm/onnxruntime-web@1.20.1/dist/ort.wasm.min.mjs");
        const ort = ortMod.InferenceSession ? ortMod : ortMod.default;
        ort.env.wasm.wasmPaths = "https://cdn.jsdelivr.net/npm/onnxruntime-web@1.20.1/dist/";
        ort.env.wasm.numThreads = 1; // GitHub Pages = COOP/COEP 없음 → 단일 스레드 필수

        const buf = await fetchModelCached(SAT_URL);
        aiState.sess = await ort.InferenceSession.create(buf, { executionProviders: ["wasm"] });
        aiState.ort = ort;
        aiState.ready = true;
      })();
      try { await aiState.promise; }
      catch (e) { aiState.promise = null; throw e; } // 실패 시 재시도 가능
    }

    function halfToFloat(h) {
      const s = (h & 0x8000) >> 15, e = (h & 0x7c00) >> 10, f = h & 0x03ff;
      if (e === 0) return (s ? -1 : 1) * Math.pow(2, -14) * (f / 1024);
      if (e === 0x1f) return f ? NaN : (s ? -Infinity : Infinity);
      return (s ? -1 : 1) * Math.pow(2, e - 15) * (1 + f / 1024);
    }

    async function aiSegment(text, threshold = 0.25) {
      if (!text) return text;
      const enc = await aiState.tok(text, { add_special_tokens: false });
      const ids = Array.from(enc.input_ids.data, (x) => Number(x));
      if (!ids.length) return text;

      const ort = aiState.ort, sess = aiState.sess;
      const inNames = sess.inputNames, outName = sess.outputNames[0];
      const BOS = 0, EOS = 2, BLOCK = 510;
      const boundary = new Array(ids.length).fill(false);

      for (let start = 0; start < ids.length; start += BLOCK) {
        const chunk = ids.slice(start, start + BLOCK);
        const seq = [BOS, ...chunk, EOS];
        const n = seq.length;
        const feeds = {};
        const i64 = (arr) => new ort.Tensor("int64", BigInt64Array.from(arr, (x) => BigInt(x)), [1, n]);
        // 이 fp16 모델은 attention_mask를 float16으로 받음.
        // ort 최신판은 native Float16Array 요구, 구판은 Uint16Array(half 비트) 사용.
        const f16 = (arr) => typeof Float16Array !== "undefined"
          ? new ort.Tensor("float16", Float16Array.from(arr, (x) => x), [1, n])
          : new ort.Tensor("float16", Uint16Array.from(arr, (x) => (x ? 0x3c00 : 0x0000)), [1, n]);
        if (inNames.includes("input_ids")) feeds.input_ids = i64(seq);             // ids는 int64 (vocab>2048라 fp16 불가)
        if (inNames.includes("attention_mask")) feeds.attention_mask = f16(seq.map(() => 1));
        if (inNames.includes("token_type_ids")) feeds.token_type_ids = i64(seq.map(() => 0));
        const out = await sess.run(feeds);
        const raw = out[outName].data; // [1, n, 1] → 길이 n (float16이면 Uint16Array)
        const isF16 = raw instanceof Uint16Array;
        const logitAt = (i) => (isF16 ? halfToFloat(raw[i]) : Number(raw[i]));
        for (let i = 0; i < chunk.length; i++) {
          const p = 1 / (1 + Math.exp(-logitAt(i + 1))); // BOS 오프셋
          if (p > threshold) boundary[start + i] = true;
        }
      }

      // 경계로 토큰 묶어 문장 단위 디코드
      const segs = []; let cur = [];
      for (let i = 0; i < ids.length; i++) { cur.push(ids[i]); if (boundary[i]) { segs.push(cur); cur = []; } }
      if (cur.length) segs.push(cur);
      const texts = [];
      for (const s of segs) {
        const t = (await aiState.tok.decode(s, { skip_special_tokens: true })).trim();
        if (t) texts.push(t);
      }
      const result = texts.join("\n");
      // 안전장치: 결과가 비었거나 경계가 하나도 없으면 폴백
      if (!result || segs.length <= 1) return text;
      return result;
    }

    async function applyAI(forNum) {
      try {
        await ensureAI();
        setStatus("AI 문장 분할 중…", true);
        const seg = await aiSegment(baseText);
        if (forNum === undefined || forNum === pageNum) {
          currentText = seg;
          playpause.disabled = !currentText;
        }
        setStatus("AI 분할 적용됨");
      } catch (e) {
        console.error("[AI]", e);
        currentText = baseText; // 폴백
        playpause.disabled = !currentText;
        setStatus("AI 분할 불가 — 규칙 기반 사용");
      }
    }

    // ---- 설정 시트 ----
    function openSheet() { $("scrim").classList.add("show"); $("sheet").classList.add("show"); }
    function closeSheet() { $("scrim").classList.remove("show"); $("sheet").classList.remove("show"); }

    // ---- 이벤트 ----
    $("file").addEventListener("change", async (e) => {
      const f = e.target.files[0];
      if (!f) return;
      loadPDF(new Uint8Array(await f.arrayBuffer()));
    });
    $("prev").addEventListener("click", () => { if (pageNum > 1) { stopSpeak(); renderPage(--pageNum); } });
    $("next").addEventListener("click", () => { if (pdfDoc && pageNum < pdfDoc.numPages) { stopSpeak(); renderPage(++pageNum); } });
    playpause.addEventListener("click", togglePlay);
    stopbtn.addEventListener("click", stopSpeak);
    $("openSettings").addEventListener("click", openSheet);
    $("scrim").addEventListener("click", closeSheet);
    $("rate").addEventListener("input", (e) => {
      $("rateval").textContent = parseFloat(e.target.value).toFixed(1) + "x";
      if (state !== "idle") { stopSpeak(); startSpeak(); } // 속도 즉시 반영
    });

    const aiToggle = $("aiToggle");
    aiToggle.checked = useAI;
    aiToggle.addEventListener("change", async () => {
      useAI = aiToggle.checked;
      localStorage.setItem("useAI", useAI ? "1" : "0");
      if (!pdfDoc) return;
      stopSpeak();
      if (useAI) { await applyAI(pageNum); }
      else { currentText = baseText; playpause.disabled = !currentText; setStatus("규칙 기반 사용"); }
    });
  </script>
</body>
</html>
